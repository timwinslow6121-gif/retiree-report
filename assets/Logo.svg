<svg viewBox="0 0 500 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Lato:wght@700&amp;family=Playfair+Display:wght@600;700&amp;display=swap');
    </style>
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AE5A" />
      <stop offset="50%" stop-color="#B8943A" />
      <stop offset="100%" stop-color="#9A7A2E" />
    </linearGradient>
    <linearGradient id="fade-line" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B8943A" stop-opacity="0" />
      <stop offset="20%" stop-color="#B8943A" stop-opacity="0.8" />
      <stop offset="80%" stop-color="#B8943A" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#B8943A" stop-opacity="0" />
    </linearGradient>
  </defs>
  
  <rect x="30" y="20" width="60" height="60" rx="4" fill="none" stroke="url(#gold-gradient)" stroke-width="3" />
  <text x="60" y="64" fill="#F7F5F2" font-size="44" font-family="'Playfair Display', serif" font-weight="700" text-anchor="middle">R</text>
  
  <line x1="115" y1="15" x2="115" y2="85" stroke="url(#fade-line)" stroke-width="1.5" />
  
  <text x="135" y="42" fill="url(#gold-gradient)" font-size="14" font-family="'Lato', sans-serif" letter-spacing="3" font-weight="700">THE</text>
  <text x="133" y="75" fill="#F7F5F2" font-size="38" font-family="'Playfair Display', serif" font-weight="600">Retiree Report</text>
</svg>